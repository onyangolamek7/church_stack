<div class="container">

  <div class="card">
    <h2>Give Your Tithe</h2>

    <form [formGroup]="titheForm" (ngSubmit)="submit()">

      <div class="amount-options">
        <button type="button" (click)="selectAmount(100)">100 KES</button>
        <button type="button" (click)="selectAmount(200)">200 KES</button>
        <button type="button" (click)="selectAmount(500)">500 KES</button>
      </div>

      <input type="number" formControlName="amount" placeholder="Amount (KES)" />

      <input type="text" formControlName="giver_name" placeholder="Full Name" />

      <input type="text" formControlName="giver_phone" placeholder="Phone" />

      <select formControlName="payment_method">
        <option value="bank">Bank</option>
        <option value="paypal">PayPal</option>
        <option value="mpesa">MPesa</option>
      </select>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Processing...' : 'Submit Tithe' }}
      </button>

      <div class="success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

    </form>
  </div>

  <!-- Display existing records -->
  <div class="card" *ngIf="tithes.length">
    <h3>Recent Tithes</h3>
    <div *ngFor="let t of tithes">
      <p>
        <strong>{{ t.giver_name }}</strong> —
        {{ t.amount }} {{ t.currency }} —
        {{ t.status }}
      </p>
    </div>
  </div>

</div>
