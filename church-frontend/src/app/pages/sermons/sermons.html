<section class="sermons-hero">
  <h1>Church Sermons</h1>
  <p>Grow spiritually through powerful teachings</p>
</section>

<section class="upcoming-section" *ngIf="upcoming.length">
  <h2>Upcoming Services</h2>

  <div class="sermon-grid">
    <div *ngFor="let sermon of upcoming" class="sermon-card upcoming">
      <h3>{{ sermon.title }}</h3>
      <p class="date">{{ sermon.service_date | date:'fullDate' }}</p>
      <p>{{ sermon.preacher }}</p>
    </div>
  </div>
</section>

<section class="past-section">
  <h2>Recent Sermons</h2>

  <div class="sermon-grid">
    <div *ngFor="let sermon of sermons" class="sermon-card">
      <h3>{{ sermon.title }}</h3>
      <p class="date">{{ sermon.service_date | date:'mediumDate' }}</p>
      <p>{{ sermon.preacher }}</p>

      <div class="actions">
        <a *ngIf="sermon.video_url" [href]="sermon.video_url" target="_blank" class="btn video">
          Watch Video
        </a>

        <a *ngIf="sermon.audio_url" [href]="sermon.audio_url" target="_blank" class="btn audio">
          Listen Audio
        </a>
      </div>
    </div>
  </div>
</section>
