<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">⛪</div>
      <h2>Welcome Back</h2>
      <p>Sign in to Israel CA Wende Injili</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="credentials.email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-row">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Your password"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            [title]="showPassword ? 'Hide password' : 'Show password'"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-full" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Create one here</a></p>
    </div>

  </div>
</div>
