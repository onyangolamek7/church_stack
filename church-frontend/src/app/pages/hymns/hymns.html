<div class="card">

  <h2>Hymn Collection</h2>

  <div class="search-box">
    <input
      type="text"
      placeholder="Search by title..."
      [value]="searchQuery()"
      (input)="onSearch($any($event.target).value)"
    />
    <!-- No separate Search button needed — filters as you type -->
  </div>

  <div class="hymn-list">
    <div
      *ngFor="let hymn of filteredHymns()"
      class="hymn-item"
      (click)="openHymn(hymn.id)"
    >
      <span class="hymn-number">#{{ hymn.id }}</span>
      <span class="hymn-title">{{ hymn.title }}</span>

      <button
        *ngIf="auth.isLoggedIn()"
        class="favorite-btn"
        [disabled]="hymnsService.isPendingFavorite(hymn.id)"
        (click)="toggleFavorite(hymn, $event)"
        [title]="hymn.isFavorite ? 'Remove from favorites' : 'Add to favorites'"
      >
        {{ hymn.isFavorite ? '❤️' : '🤍' }}
      </button>
    </div>

    <p *ngIf="filteredHymns().length === 0" class="empty-search">
      No hymns found for "<strong>{{ searchQuery() }}</strong>". Try a different search.
    </p>
  </div>

  <!-- Pagination — only when not searching (search spans all loaded pages) -->
  <div class="pagination" *ngIf="hymnsService.lastPage() > 1 && !searchQuery()">
    <button
      (click)="goToPage(hymnsService.currentPage() - 1)"
      [disabled]="hymnsService.currentPage() === 1"
    >
      Previous
    </button>

    <button
      *ngFor="let page of pages"
      (click)="goToPage(page)"
      [class.active]="page === hymnsService.currentPage()"
    >
      {{ page }}
    </button>

    <button
      (click)="goToPage(hymnsService.currentPage() + 1)"
      [disabled]="hymnsService.currentPage() === hymnsService.lastPage()"
    >
      Next
    </button>
  </div>

</div>
