<div class="card">

  <h2>Hymn Collection</h2>

  <!-- SEARCH -->
  <div class="search-box">
    <input
    type="text"
    placeholder="Search hymns..."
    [(ngModel)]="searchQuery"
    (ngModelChange)="onSearch()"
  />
  <button (click)="onSearch()">Search</button>
  </div>

  <div class="hymn-list">
    <div *ngFor="let hymn of filteredHymns()" class="hymn-item" (click)="viewHymn(hymn)">
      <span class="hymn-number">#{{ hymn.id }}</span>
      <span class="hymn-title">{{ hymn.title }}</span>
      <button
      *ngIf="auth.isLoggedIn()"
      class="favorite-btn"
      (click)="toggleFavorite(hymn, $event)">
      {{ hymn.isFavorite ? '❤️' : '🤍' }}
      </button>
    </div>

      <p *ngIf="filteredHymns().length === 0" style="text-align: center; padding: 2rem; color: #558b2f;">
        No hymns found. Try a different search.
      </p>
  </div>

  <!-- pagination-->
   <div class="pagination" *ngIf="hymnsService.lastPage() > 1">
    <button (click)="goToPage(hymnsService.currentPage() - 1)" [disabled]="hymnsService.currentPage() === 1">
      Previous
    </button>

  <button
    *ngFor="let page of pages"
    (click)="goToPage(page)"
    [class.active]="page === hymnsService.currentPage()"
    >
    {{ page }}
    </button>

    <button (click)="goToPage(hymnsService.currentPage() + 1)" [disabled]="hymnsService.currentPage() === hymnsService.lastPage()">
      Next
    </button>
  </div>

  <!-- Modal -->
   <div class="modal-overlay" *ngIf="isModalOpen">

    <div class="modal">
      <button class="close-btn" (click)="closeModal()">x</button>

      <h2>{{selectedHymn?.title}}</h2>

      <p class="lyrics">
        {{selectedHymn?.lyrics}}
      </p>
    </div>

   </div>
</div>
