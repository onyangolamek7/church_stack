<nav class="navbar">

  <div class="nav-container">

    <a routerLink="/" class="navbar-brand">⛪ ISRAEL.CA WENDE INJILI</a>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>

      <a routerLink="/hymns" routerLinkActive="active">
        Hymns
      </a>

      <a routerLink="/sermons" routerLinkActive="active">
        Sermons
      </a>

      <a routerLink="/tithe" routerLinkActive="active">
        Tithe
      </a>

      <!-- Admin link — only shown to admin users -->
      <a routerLink="/admin" routerLinkActive="active" *ngIf="isAdmin">
        <span class="admin-badge">Admin</span>
      </a>

      <a routerLink="/profile" routerLinkActive="active" *ngIf="isLoggedIn">
        👤 {{ userName }}
      </a>

      <a routerLink="/login" routerLinkActive="active" *ngIf="!isLoggedIn">
        Login
      </a>

      <a href="#" *ngIf="isLoggedIn" (click)="logout(); $event.preventDefault()">
        Logout
      </a>

  </div>
