server {
    # PORT is injected at runtime by start.sh via envsubst
    listen __PORT__;
    root /var/www/public;
    index index.php index.html;

    # Increase timeouts for slow DB queries on cold starts
    fastcgi_read_timeout 300;
    fastcgi_send_timeout 300;

    # CORS origin — update this to your Angular frontend URL
    set $cors_origin "https://sunny-simplicity-production.up.railway.app";

    # Handle OPTIONS preflight before anything else
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header Access-Control-Allow-Credentials 'true' always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Static files and Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # CORS headers on all PHP responses
        fastcgi_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header Access-Control-Allow-Credentials 'true' always;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
