server {
    listen 8080;
    root /var/www/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
```

Your `Church-hymnal/` folder should now have:
```
Church-hymnal/
├── Dockerfile        ← new
├── nginx.conf        ← new
├── .env.example      ← new
├── .env              ← stays local, never committed
├── app/
├── routes/
└── ... (rest of Laravel files)
```

